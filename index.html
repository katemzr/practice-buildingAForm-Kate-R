<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Form</title>
</head>

<body>

    <header>
        <h1>⛺Contact Us⛺</h1>
    </header>

    <form action="/submit" method="POST">

        <!--Full Name Input (text input)-->
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>

        <!--Email Input (email input)-->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <!--Password Input for Acct Verification (password input)-->
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" minlength="8" maxlength="15" required>

        <!--Feedback Category (dropdown/select input)-->
        <label for="location">Store Location:</label>
        <select id="lcoation" name="location">
            <option value="Zumbehl">Zumbehl</option>
            <option value="Muegge">Muegge</option>
            <option value="First Capitol">First Capitol</option>
        </select>

        <!--Preferred Contact Method (radio button)-->
        <fieldset>
            <legend>Preferred Contact Method:</legend>
            <label for="email">
                <input type="radio" id="email" name="contact" value="email" checked>
                Email
            </label>
            <label for="phone">
                <input type="radio" id="phone" name="contact" value="phone">
                Phone
            </label>
        </fieldset>

        <!--Additional Features of Interest/Store Departments(checkboxes)-->
        <fieldset>
            <legend>Choose One or More Store Departments:</legend>
            <label for="camping">
                <input type="checkbox" id="camping" name="departments" value="camping">Camping
            </label>
            <label for="hiking">
                <input type="checkbox" id="hiking" name="departments" value="hiking">Hiking
            </label>
            <label for="rock climbing">
                <input type="checkbox" id="rock climbing" name="departments" value="rock climbing">Rock Climbing
            </label>
        </fieldset>

        <!--Comments(Textarea)-->
        <label for="message">Comments:</label>
        <textarea id="message" name="message" rows="5" cols="30" placeholder="Write your comments here"></textarea>

        <!--Submit Button(to send data)-->
        <input type="submit" value="Submit">
    
    </form>

</body>
</html>
